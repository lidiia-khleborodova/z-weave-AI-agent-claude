<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-Emotion Help</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    header span { color: #666; font-size: 13px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #444;
      text-align: center;
      pointer-events: none;
    }

    .empty-state h2 { font-size: 18px; color: #fff; font-weight: 600; }
    .empty-state p { font-size: 13.5px; line-height: 1.6; max-width: 320px; color: #fff; }
    .empty-state.hidden { display: none; }

    .message { display: flex; flex-direction: column; gap: 8px; max-width: 760px; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14.5px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: #1c1c1c; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
    .message.assistant .bubble a { color: #fff; }

    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid #2a2a2a; padding: 6px 10px; text-align: left; }
    .bubble th { background: #222; font-weight: 600; }
    .bubble ul { padding-left: 18px; margin: 4px 0; }
    .bubble p { margin: 4px 0; }

    .img-chat {
      border-radius: 6px;
      margin: 6px 0;
      display: block;
      max-width: 400px;
    }

    .typing-indicator { color: #555; font-size: 13px; font-style: italic; }

    .assets-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .asset-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      width: 180px;
      transition: border-color 0.15s;
    }
    .asset-card:hover { border-color: #3a3a3a; }
    .asset-card img { width: 100%; height: 160px; object-fit: cover; background: #222; display: block; }
    .card-info { padding: 10px 12px; }
    .card-info h3 { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #ccc; line-height: 1.4; }
    .card-info a {
      display: block;
      background: #2563eb;
      color: #fff;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.15s;
    }
    .card-info a:hover { background: #1d4ed8; }

    form {
      border-top: 1px solid #1e1e1e;
      background: #141414;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e5e5e5;
      font-size: 14.5px;
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 140px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: #3a3a3a; }
    #input::placeholder { color: #444; }

    #send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Z-Emotion</h1>
    <span>Help Assistant</span>
  </header>

  <div id="messages">
    <div class="empty-state" id="welcome">
      <h2>How can I help you?</h2>
      <p>Ask about Z-Emotion products, help center articles, or find a pattern.</p>
    </div>
  </div>

  <form onsubmit="sendMessage(event)">
    <textarea
      id="input"
      placeholder="Ask a question..."
      rows="1"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" type="submit">Send</button>
  </form>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const welcome = document.getElementById('welcome');
    let sessionId = null;

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(e);
      }
    });

    function isNearBottom() {
      return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 100;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function inlineMarkdown(text) {
      const parts = [];
      const pattern = /!\[([^\]]*)\]\((https?:\/\/[^)]+)\)|\[([^\]]+)\]\((https?:\/\/[^)]+)\)|(https?:\/\/[^\s<>'"]+)|\*\*(.+?)\*\*|\*(.+?)\*/g;
      let last = 0;
      let match;
      while ((match = pattern.exec(text)) !== null) {
        parts.push(escapeHtml(text.slice(last, match.index)));
        if (match[1] !== undefined) {
          parts.push(`<img src="${match[2]}" alt="${escapeHtml(match[1])}" class="img-chat">`);
        } else if (match[4]) {
          parts.push(`<a href="${match[4]}" target="_blank">${escapeHtml(match[3] ?? match[4])}</a>`);
        } else if (match[5]) {
          const url = match[5].replace(/[.,;:!'")\]]+$/, '');
          const trailing = match[5].slice(url.length);
          parts.push(`<a href="${url}" target="_blank">${escapeHtml(url)}</a>${escapeHtml(trailing)}`);
        } else if (match[6]) {
          parts.push(`<strong>${escapeHtml(match[6])}</strong>`);
        } else if (match[7]) {
          parts.push(`<em>${escapeHtml(match[7])}</em>`);
        }
        last = match.index + match[0].length;
      }
      parts.push(escapeHtml(text.slice(last)));
      return parts.join('');
    }

    function renderMarkdown(text) {
      const lines = text.split('\n');
      let html = '';
      let inTable = false;
      let tableHeader = false;
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        if (line.trim().startsWith('|')) {
          if (/^\|[\s\-|:]+\|$/.test(line.trim())) { tableHeader = false; continue; }
          if (!inTable) {
            if (inList) { html += '</ul>'; inList = false; }
            html += '<table>'; inTable = true; tableHeader = true;
          }
          const cells = line.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
          const tag = tableHeader ? 'th' : 'td';
          html += '<tr>' + cells.map(c => `<${tag}>${inlineMarkdown(c)}</${tag}>`).join('') + '</tr>';
          tableHeader = false;
          continue;
        } else if (inTable) { html += '</table>'; inTable = false; }

        if (/^[-*] /.test(line)) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${inlineMarkdown(line.replace(/^[-*] /, ''))}</li>`;
          continue;
        } else if (inList) { html += '</ul>'; inList = false; }

        const imgMatch = line.match(/^!\[([^\]]*)\]\((https?:\/\/[^)]+)\)$/);
        if (imgMatch) {
          html += `<img src="${imgMatch[2]}" alt="${escapeHtml(imgMatch[1])}" class="img-chat">`;
          continue;
        }

        if (/^#{1,3} /.test(line)) {
          const level = line.match(/^(#{1,3})/)[1].length;
          html += `<h${level + 2} style="margin:8px 0 4px;font-size:${15 - level}px">${inlineMarkdown(line.replace(/^#{1,3} /, ''))}</h${level + 2}>`;
          continue;
        }

        if (line.trim() === '') { html += '<br>'; continue; }

        html += `<p>${inlineMarkdown(line)}</p>`;
      }

      if (inTable) html += '</table>';
      if (inList) html += '</ul>';
      return html;
    }

    function renderAssetCards(json, container) {
      try {
        const assets = JSON.parse(json);
        const grid = document.createElement('div');
        grid.className = 'assets-grid';
        assets.forEach(a => {
          const card = document.createElement('div');
          card.className = 'asset-card';
          const meta = a.category === 'fabric'
            ? [a.styleType, a.color?.join(', '), a.texture, a.composition].filter(Boolean).join(' · ')
            : [a.gender, a.styleType].filter(Boolean).join(' · ');
          const ext = a.fileType || (a.category === 'fabric' ? 'u3ma' : 'zls');
          card.innerHTML = `
            <img src="${a.previewUrl}" alt="${a.name}" onerror="this.style.display='none'">
            <div class="card-info">
              <h3>${a.name}</h3>
              ${meta ? `<p style="font-size:11px;color:#666;margin-bottom:6px; min-height: 53px">${meta}</p>` : ''}
              <a href="${a.downloadUrl}" download="${a.name}.${ext}">Download</a>
            </div>`;
          grid.appendChild(card);
        });
        container.appendChild(grid);
      } catch {
        container.textContent = 'Failed to load asset results.';
      }
    }

    function addMessage(role, content = '') {
      welcome.classList.add('hidden');
      const msg = document.createElement('div');
      msg.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (role === 'user') {
        bubble.textContent = content;
      } else {
        bubble.innerHTML = content;
      }
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      if (isNearBottom()) messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function sendMessage(e) {
      e.preventDefault();
      const question = inputEl.value.trim();
      if (!question || sendBtn.disabled) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', question);

      const bubble = addMessage('assistant', '<span class="typing-indicator">Thinking...</span>');

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, sessionId }),
        });

        if (!sessionId) sessionId = response.headers.get('X-Session-Id');

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            const assetIdx = fullText.indexOf('ASSET_RESULTS:');
            if (assetIdx !== -1) {
              const intro = fullText.slice(0, assetIdx);
              bubble.innerHTML = intro ? renderMarkdown(intro) : '';
              renderAssetCards(fullText.slice(assetIdx + 'ASSET_RESULTS:'.length), bubble);
            } else {
              bubble.innerHTML = renderMarkdown(fullText);
            }
            if (isNearBottom()) messagesEl.scrollTop = messagesEl.scrollHeight;
            break;
          }
          fullText += decoder.decode(value, { stream: true });
          if (fullText.indexOf('ASSET_RESULTS:') === -1) {
            const lastNewline = fullText.lastIndexOf('\n');
            if (lastNewline !== -1) {
              bubble.innerHTML = renderMarkdown(fullText.slice(0, lastNewline));
              if (isNearBottom()) messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          }
        }
      } catch (err) {
        bubble.textContent = 'Something went wrong. Please try again.';
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>z-emotion 에셋 챗봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    header span { color: #666; font-size: 13px; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message { display: flex; flex-direction: column; gap: 8px; max-width: 760px; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14.5px;
      line-height: 1.6;
    }
    .user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .assistant .bubble { background: #1c1c1c; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
    .assets-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .asset-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      width: 190px;
      transition: border-color 0.15s;
    }
    .asset-card:hover { border-color: #3a3a3a; }
    .asset-card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      background: #222;
      display: block;
    }
    .card-info { padding: 10px 12px; }
    .card-info h3 { font-size: 12.5px; font-weight: 600; margin-bottom: 8px; color: #ccc; line-height: 1.4; }
    .card-info a {
      display: block;
      background: #2563eb;
      color: #fff;
      text-align: center;
      padding: 7px;
      border-radius: 6px;
      font-size: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.15s;
    }
    .card-info a:hover { background: #1d4ed8; }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #444;
      text-align: center;
    }
    .empty-state h2 { font-size: 18px; color: #666; font-weight: 600; }
    .empty-state p { font-size: 13.5px; line-height: 1.6; max-width: 320px; }
    .typing-indicator { color: #555; font-size: 13px; padding: 2px 0; }
    form {
      border-top: 1px solid #1e1e1e;
      background: #141414;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e5e5e5;
      font-size: 14.5px;
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 140px;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: #3a3a3a; }
    #input::placeholder { color: #444; }
    #send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>z-emotion</h1>
    <span>에셋 라이브러리 챗봇</span>
  </header>

  <div id="messages">
    <div class="empty-state">
      <h2>안녕하세요 👋</h2>
      <p>원하는 3D 의류 에셋을 자연어로 검색하세요.<br>
      예: "빨간 스커트", "여성 코트 보여줘", "파란색 바지"</p>
    </div>
  </div>

  <form onsubmit="send(event)">
    <textarea
      id="input"
      placeholder="의류 에셋을 검색하세요..."
      rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send(event)}"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" type="submit">전송</button>
  </form>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const history = [];

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }

    function clearEmpty() {
      const el = messagesEl.querySelector('.empty-state');
      if (el) el.remove();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, text, assets = []) {
      clearEmpty();
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      msg.appendChild(bubble);

      if (assets.length > 0) {
        const grid = document.createElement('div');
        grid.className = 'assets-grid';
        assets.forEach(a => {
          const card = document.createElement('div');
          card.className = 'asset-card';
          card.innerHTML = `
            <img src="${a.previewUrl}" alt="${a.name}" onerror="this.style.display='none'">
            <div class="card-info">
              <h3>${a.name}</h3>
              <a href="${a.downloadUrl}" download="${a.name}.zls">다운로드</a>
            </div>
          `;
          grid.appendChild(card);
        });
        msg.appendChild(grid);
      }

      messagesEl.appendChild(msg);
      scrollBottom();
      return msg;
    }

    function addTyping() {
      clearEmpty();
      const el = document.createElement('div');
      el.className = 'message assistant';
      el.id = 'typing';
      el.innerHTML = '<div class="typing-indicator">응답 생성 중...</div>';
      messagesEl.appendChild(el);
      scrollBottom();
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    async function send(e) {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', content: text });
      addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(-10) })
        });
        const data = await res.json();
        removeTyping();
        addMessage('assistant', data.message, data.assets || []);
        history.push({ role: 'assistant', content: data.message });
      } catch (err) {
        removeTyping();
        addMessage('assistant', '오류가 발생했습니다: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function sync() {
      const btn = document.getElementById('sync-btn');
      btn.textContent = '동기화 중...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/sync', { method: 'POST' });
        const data = await res.json();
        btn.textContent = data.success ? `완료 (${data.count}개)` : '실패';
      } catch {
        btn.textContent = '실패';
      }
      setTimeout(() => { btn.textContent = '에셋 동기화'; btn.disabled = false; }, 2500);
    }
  </script>
</body>
</html>
